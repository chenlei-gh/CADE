# CADE Knowledge Catalog

元数据索引——AI 通过关键词秒定位，不全文搜索。

## 统一 Schema

所有 knowledge/pattern/example 文件使用一致的 YAML frontmatter:

```yaml
---
id: part.fillet                    # 全局唯一 ID
title: Edge Fillet                 # 显示名称
category: knowledge                # knowledge | pattern | example
domain: part                       # CAA 域
keywords: [fillet, radius, blend]  # 检索关键词
apis: [CATIFillet]                 # 涉及 API
requires: [CATISpecObject]         # 前置知识 ID
patterns: [geometry_analyzer]      # 关联 Pattern ID
examples: [fillet_checker]         # 关联 Example ID
release: [R19, R28]                # 适用 CATIA 版本
tags: [geometry, feature]          # 标签
---
```

