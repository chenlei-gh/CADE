# CADE Knowledge Catalog

元数据索引——AI 通过关键词秒定位，不全文搜索。

## 统一 Schema

所有 knowledge/pattern/example 文件使用一致的 YAML frontmatter:

```yaml
---
id: part.fillet                    # 全局唯一 ID
title: Edge Fillet                 # 显示名称
category: knowledge                # knowledge | pattern | example
domain: part                       # CAA 域
keywords: [fillet, radius, blend]  # 检索关键词
apis: [CATIFillet]                 # 涉及 API
requires: [CATISpecObject]         # 前置知识 ID
patterns: [geometry_analyzer]      # 关联 Pattern ID
examples: [fillet_checker]         # 关联 Example ID
release: [R19, R28]                # 适用 CATIA 版本
tags: [geometry, feature]          # 标签
---
```

## 别名映射 (Aliases)

同义词/中英文映射——解决关键词精确匹配的局限性。
Kernel 检索时自动展开：用户搜 "倒角" → 匹配 chamfer, bevel, edge treatment。

| 别名 | 展开为关键词 |
|------|------------|
| 倒角 | chamfer, bevel, edge break |
| 倒圆角 | fillet, radius, blend, rounding |
| 打孔 | hole, drill, bore, punch |
| 装配/装配体 | assembly, product, component, BOM |
| 工程图 | drawing, sheet, view, drafting |
| 曲面 | surface, GSD, patch, face |
| 撤销 | undo, rollback, revert |
| 重做 | redo, replay |
| 颜色/着色 | color, material, visualization, appearance |
| 选择/选取 | selection, pick, highlight, locate |
| 参数 | parameter, formula, relation, attribute |
| 更新 | update, refresh, rebuild, regenerate |
| 导出 | export, save, output, write |
| 对话框 | dialog, window, form, panel |
| 右键菜单 | context menu, right click, popup menu |
| 工具栏 | toolbar, ribbon, command bar |
| 生命周期 | lifecycle, activate, deactivate, cleanup |
| 命名规范 | naming, convention, prefix, suffix |
| 内存管理 | memory, AddRef, Release, leak |
| 错误处理 | error, HRESULT, exception, CHECK_ARGS |
| 状态命令 | state command, BuildGraph, wizard, transition |
| 标注/注释 | annotation, dimension, PMI, FTA, tolerance |
| 持久化 | persistence, serialize, save, load, stream |
| 约束 | constraint, coincide, contact, offset, angle, fix, DOF |
| 向导 | wizard, step, back, next, finish, multi-step |
| 3D标注 | FTA, PMI, annotation, tolerance, GD&T, dimension |
| 工程图/出图 | drawing, sheet, view, drafting, DWG, PDF |
| 查找/搜索 | search, find, locate, lookup, query, retrieve |
| 重构/改名 | refactor, rename, move, reorganize, restructure |

